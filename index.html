<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ljs2023 Subs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ljs2023 Subs">

    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #000;
        color: #fff;
        text-align: center;
        margin: 0;
        padding-top: 30px;
      }

      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
      }

      .logo-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .yt-badge {
        width: 40px;
        height: 28px;
        background: #ff0000;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .yt-badge .triangle {
        width: 0;
        height: 0;
        border-left: 14px solid #ffffff;
        border-top: 9px solid transparent;
        border-bottom: 9px solid transparent;
      }

      .title-text {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.03em;
        color: #ff0000;
      }

      #count {
        font-size: 96px;
        font-weight: 800;
        margin: 24px 0 8px;
        line-height: 1;
      }

      @media (orientation: landscape) {
        #count {
          font-size: 45vh;
          margin: 8px 0 4px;
        }
      }

      .stats-row {
        display: flex;
        justify-content: center;
        gap: 32px;
        margin-top: 12px;
      }

      .stat-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
      }

      .stat-label {
        font-size: 12px;
        font-weight: 500;
        color: #aaaaaa;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      #updated {
        font-size: 14px;
        margin-top: 16px;
        color: #aaaaaa;
      }

      #error {
        font-size: 14px;
        margin-top: 8px;
        color: #ff6666;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo-row">
        <div class="yt-badge">
          <div class="triangle"></div>
        </div>
        <div class="title-text">ljs2023 Subs</div>
      </div>
    </div>

    <div id="count">–</div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="view-count">–</div>
        <div class="stat-label">Total Views</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="video-count">–</div>
        <div class="stat-label">Videos</div>
      </div>
    </div>

    <div id="updated">Last updated: —</div>
    <div id="error"></div>

    <script>
      const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbySjshcmfGbIRfiGXmwChLhB4Csa5L-rENGPd8gdG7newEkcM85ZdqfkVm6YmNS_EYh/exec';

      function formatNumber(n) {
        return Number(n).toLocaleString();
      }

      function formatSubs(n) {
        n = Number(n);
        if (n < 1000) return n.toString();
        else if (n < 1000000) return (n / 1000).toFixed(2) + 'K';
        else if (n < 1000000000) return (n / 1000000).toFixed(2) + 'M';
        else return (n / 1000000000).toFixed(2) + 'B';
      }

      async function fetchSubscriberCount() {
        const countEl      = document.getElementById('count');
        const viewCountEl  = document.getElementById('view-count');
        const videoCountEl = document.getElementById('video-count');
        const updatedEl    = document.getElementById('updated');
        const errorEl      = document.getElementById('error');

        try {
          errorEl.textContent = '';
          const resp = await fetch(BACKEND_URL, { cache: 'no-store' });
          const data = await resp.json();

          if (data.error) {
            countEl.textContent = 'N/A';
            errorEl.textContent = data.error;
            return;
          }

          countEl.textContent      = data.subscriberCount ? formatSubs(data.subscriberCount) : 'N/A';
          viewCountEl.textContent  = data.viewCount  ? formatNumber(data.viewCount)  : 'N/A';
          videoCountEl.textContent = data.videoCount ? formatNumber(data.videoCount) : 'N/A';

          const now = new Date();
          updatedEl.textContent = 'Last updated: ' + now.toLocaleTimeString();

        } catch (err) {
          console.error(err);
          countEl.textContent = '–';
          errorEl.textContent = 'Error contacting backend';
        }
      }

      fetchSubscriberCount();
      setInterval(fetchSubscriberCount, 60000);
    </script>
  </body>
</html>
